<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" role="img" aria-label="BridgeUp — Learn Python, the right way">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f1a34"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <circle cx="980" cy="70" r="260" fill="url(#glow)"/>
  <g stroke="#1e2b48" stroke-width="1" opacity="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- graduation cap mark -->
  <g transform="translate(96,116)">
    <rect x="-28" y="-28" width="120" height="120" rx="26" fill="#111c34" stroke="#24365c" stroke-width="1.5"/>
    <g transform="translate(32,32) scale(2.05) translate(-16,-16)">
      <path d="M16 7 L29 12.5 L16 18 L3 12.5 Z" fill="url(#brand)"/>
      <path d="M9 15 V21 C9 22.7 12.1 24 16 24 C19.9 24 23 22.7 23 21 V15" fill="none" stroke="#14b8a6" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M29 12.5 V19.5" stroke="#8fb4ff" stroke-width="2.1" stroke-linecap="round"/>
      <circle cx="29" cy="21" r="1.7" fill="#8fb4ff"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <text x="250" y="150" font-size="82" font-weight="800" fill="#f4f7ff" letter-spacing="-1">Bridge<tspan fill="url(#brand)">Up</tspan></text>
  <text x="252" y="196" font-size="27" font-weight="500" fill="#9fb0d0">Learn Python, the right way — placement exam to real code in the browser.</text>

  <!-- feature chips -->
  <g font-size="19" font-weight="600">
    <g transform="translate(252,232)">
      <rect width="196" height="42" rx="21" fill="#0e1a30" stroke="#24365c" stroke-width="1"/>
      <circle cx="26" cy="21" r="5" fill="#3b82f6"/>
      <text x="42" y="28" fill="#c7d4ee">Placement exam</text>
    </g>
    <g transform="translate(464,232)">
      <rect width="232" height="42" rx="21" fill="#0e1a30" stroke="#24365c" stroke-width="1"/>
      <circle cx="26" cy="21" r="5" fill="#14b8a6"/>
      <text x="42" y="28" fill="#c7d4ee">In-browser Python</text>
    </g>
    <g transform="translate(712,232)">
      <rect width="270" height="42" rx="21" fill="#0e1a30" stroke="#24365c" stroke-width="1"/>
      <circle cx="26" cy="21" r="5" fill="#8b5cf6"/>
      <text x="42" y="28" fill="#c7d4ee">Student · Faculty · Admin</text>
    </g>
  </g>
</svg>
