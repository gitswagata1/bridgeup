name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-check all JavaScript
        run: |
          for f in js/*.js; do echo "checking $f"; node --check "$f"; done
      - name: Run test suite
        run: node --test tests/*.test.mjs
